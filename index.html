<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="sidebar-title">
                <img src="img/icons/view-dashboard.svg" width="50px" height="50px">
                <h1>Dashboard</h1>
            </div>
            <div class="sidebar-items">
                <ul class="sidebar-links">
                    <li>
                        <img src="img/icons/home.svg" alt="icon of a house" width="25px" height="25px">
                        Home
                    </li>
                    <li>
                        <img src="img/icons/card-account-details-outline.svg" alt="icon of a card account" width="25px" height="25px">
                        Profile
                    </li>
                    <li>
                        <img src="img/icons/message-reply.svg" alt="icon of a message box" width="25px" height="25px">
                        Messages
                    </li>
                    <li>
                        <img src="img/icons/clock-time-three.svg" alt="icon of a clock" width="25px" height="25px">
                        History
                    </li>
                    <li>
                        <img src="img/icons/note-multiple.svg" alt="icon of a notes paper" width="25px" height="25px">
                        Tasks
                    </li>
                    <li>
                        <img src="img/icons/account-group.svg" alt="icon of a group of people" width="25px" height="25px">
                        Communities
                    </li>
                </ul>
                <ul class="sidebar-links">
                    <li>
                        <img src="img/icons/cog.svg" alt="icon of a cog gear" width="25px" height="25px">
                        Settings
                    </li>
                    <li>
                        <img src="img/icons/help-box.svg" alt="icon of a question mark box" width="25px" height="25px">
                        Support
                    </li>
                    <li>
                        <img src="img/icons/shield-check.svg" alt="icon of a shield with a check" width="25px" height="25px">
                        Privacy
                    </li>
                </ul>
            </div>
        </nav>
        <div class="header">
            <div class="header-top">
                <div class="header-top-left">
                    <img src="img/icons/magnify.svg" alt="magnifying glass icon" width="30px" height="30px">
                    <form class="search-bar">
                        <label for="search"></label>
                        <input type="search" id="search" name="search">
                    </form>
                </div>
            </div>
        </div>
        <div class="body"></div>
    </div>
</body>
</html>
